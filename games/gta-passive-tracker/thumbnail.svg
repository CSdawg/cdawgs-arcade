<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">GTA Passive Business Tracker</title>
  <desc id="desc">Dark arcade style tracker thumbnail with green and blue business bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="0.52" stop-color="#0d1422"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#75f7b0"/>
      <stop offset="1" stop-color="#d7ffe5"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#65b7ff"/>
      <stop offset="1" stop-color="#cce7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="160" cy="120" r="300" fill="#65b7ff" opacity="0.16"/>
  <circle cx="980" cy="135" r="260" fill="#75f7b0" opacity="0.14"/>
  <g filter="url(#shadow)">
    <rect x="105" y="92" width="990" height="490" rx="44" fill="#121b2a" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="155" y="178" fill="#75f7b0" font-family="Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="6">C DAWG'S ARCADE</text>
    <text x="155" y="258" fill="#edf4ff" font-family="Arial, sans-serif" font-size="72" font-weight="900">GTA Business</text>
    <text x="155" y="334" fill="#edf4ff" font-family="Arial, sans-serif" font-size="72" font-weight="900">Tracker</text>
    <rect x="160" y="404" width="410" height="32" rx="16" fill="#263348"/>
    <rect x="160" y="404" width="285" height="32" rx="16" fill="url(#green)"/>
    <rect x="160" y="468" width="410" height="32" rx="16" fill="#263348"/>
    <rect x="160" y="468" width="350" height="32" rx="16" fill="url(#blue)"/>
    <g transform="translate(690 190)">
      <rect width="300" height="250" rx="34" fill="#0b111c" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="35" y="70" fill="#98a8c4" font-family="Arial, sans-serif" font-size="24" font-weight="700">Tracked value</text>
      <text x="35" y="135" fill="#75f7b0" font-family="Arial, sans-serif" font-size="52" font-weight="900">$1.8M</text>
      <rect x="35" y="170" width="230" height="44" rx="22" fill="#75f7b0"/>
      <text x="69" y="201" fill="#06130b" font-family="Arial, sans-serif" font-size="24" font-weight="900">IN GAME</text>
    </g>
  </g>
</svg>
